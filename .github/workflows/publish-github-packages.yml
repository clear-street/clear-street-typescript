# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to GitHub Packages in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/clear-street/clear-street-typescript/actions/workflows/publish-github-packages.yml
name: Publish GitHub Packages
on:
  workflow_dispatch:

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com
          scope: '@clear-street'

      - name: Install dependencies
        run: |
          yarn install

      - name: Publish to GitHub Packages
        run: |
          bash ./bin/publish-npm
        env:
          # Override the publish target (and the `npm view` version check) without
          # editing package.json's publishConfig. yarn/npm read `registry` from this.
          npm_config_registry: https://npm.pkg.github.com
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
